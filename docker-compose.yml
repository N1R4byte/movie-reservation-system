services:
  postgres:
    image: postgres:15-alpine
    container_name: movie-reservation-db
    ports:
      - "${DB_PORT}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d/migrations
    networks:
      - movie-network

  adminer:
    image: adminer:latest
    container_name: movie-adminer
    ports:
      - "8081:8080"
    depends_on:
      - postgres
    networks:
      - movie-network

networks:
  movie-network:
    driver: bridge

volumes:
  postgres_data:
